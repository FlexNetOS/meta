defaults:
  parallel: true

projects:
  handoff:
    repo: git@github.com:FlexNetOS/handoff.git
    tags: [orchestration, handoff]
  # Foundation crates (no workspace deps)
  loop_lib:
    repo: git@github.com:FlexNetOS/loop_lib.git
    provides: [loop-lib]
    tags: [canon]

  meta_plugin_protocol:
    repo: git@github.com:FlexNetOS/meta_plugin_protocol.git
    provides: [plugin-protocol]
    tags: [canon]

  meta_plugin_api:
    repo: git@github.com:FlexNetOS/meta_plugin_api.git
    provides: [plugin-api]
    tags: [canon]

  meta_core:
    repo: git@github.com:FlexNetOS/meta_core.git
    provides: [meta-core]
    tags: [canon]

  meta_git_lib:
    repo: git@github.com:FlexNetOS/meta_git_lib.git
    provides: [meta-git-lib]
    tags: [canon]

  # Mid-level crates
  loop_cli:
    repo: git@github.com:FlexNetOS/loop_cli.git
    depends_on: [loop-lib]
    tags: [canon]

  meta_cli:
    repo: git@github.com:FlexNetOS/meta_cli.git
    provides: [meta-cli]
    depends_on: [meta-core, plugin-protocol, loop-lib]
    tags: [canon]

  # Top-level crates (depend on meta_cli and/or plugins)
  meta_git_cli:
    repo: git@github.com:FlexNetOS/meta_git_cli.git
    depends_on: [plugin-protocol, meta-git-lib, meta-cli, loop-lib]
    tags: [canon]

  meta_project_cli:
    repo: git@github.com:FlexNetOS/meta_project_cli.git
    depends_on: [plugin-protocol, meta-cli, meta-git-lib]
    tags: [canon]

  meta_rust_cli:
    repo: git@github.com:FlexNetOS/meta_rust_cli.git
    depends_on: [plugin-protocol, meta-cli]
    tags: [canon]

  meta_mcp:
    repo: git@github.com:FlexNetOS/meta_mcp.git
    depends_on: [meta-cli]

  # `meta dashboard` — renders the yazelix mission-control layout by shelling
  # to `envctl dashboard --json` (no envctl crate dep; loose CLI coupling).
  meta_dashboard_cli:
    repo: git@github.com:FlexNetOS/meta_dashboard_cli.git
    depends_on: [plugin-protocol]

  # Standalone tools
  agent:
    repo: git@github.com:FlexNetOS/agent.git
    provides: [agent]
    tags: [ai, framework]

  atc:
    repo: git@github.com:FlexNetOS/atc.git
    provides: [atc]
    tags: [ai, orchestration, rust]   # mission-control: group under the `ai` tab (agent orchestrator)

  envctl:
    repo: git@github.com:FlexNetOS/envctl.git
    provides: [envctl]
    tags: [tools, env]

  # Non-code repos
  claude-plugins:
    repo: git@github.com:FlexNetOS/claude-plugins.git
    tags: [ai]   # mission-control: Claude Code plugins -> `ai` tab

  claude-plugin:
    repo: git@github.com:FlexNetOS/meta.git
    path: claude-plugin
    tags: [ai, plugin]

  copilot-plugin:
    repo: git@github.com:FlexNetOS/meta.git
    path: copilot-plugin
    tags: [ai, plugin]

  meta-plugins:
    repo: git@github.com:FlexNetOS/meta-plugins.git
    tags: [tools]   # mission-control: dev tooling -> `tools` tab (with envctl)

  # Org defaults — community-health fallback + reusable CI (GitHub requires the
  # ".github" repo name; cloned to .github_org/ locally to avoid colliding with
  # the meta root's own .github/ directory). Tracked here as a peer.
  # Refactor in progress: tasks/github-meta-refactor (slim to roles 1 + 6).
  github_org:
    repo: git@github.com:FlexNetOS/.github.git
    path: .github_org
    tags: [org, ci]

  # =====================================================================
  # FlexNetOS workspace peers — grounded from the .github umbrella refactor.
  # Content placement is PROVISIONAL: repos are grounded first, content moved
  # later. Tags marked [untriaged] need classification. See tasks/github-meta-refactor.
  # =====================================================================

  # --- Extracted operational concerns (new repos) ---
  # flexnetos_secrets RETIRED → envctl (ADR-0007): envctl already owns the vault /
  # secretd / broker / relay + the ProviderMint GitHub-token seam, so a second store
  # would be split-brain. Empty-repo archival is a NEEDS-HUMAN owner decision.
  # flexnetos_github_app + flexnetos_runner are built at P0 per ADR-0008.
  flexnetos_runner:
    repo: git@github.com:FlexNetOS/flexnetos_runner.git
    tags: [ops, runner]
  flexnetos_github_app:
    repo: git@github.com:FlexNetOS/flexnetos_github_app.git
    tags: [ops, github-app]
  flexnetos_wiki:
    repo: git@github.com:FlexNetOS/flexnetos_wiki.git
    tags: [docs]
  flexnetos_brain:
    repo: git@github.com:FlexNetOS/flexnetos_brain.git
    tags: [docs, data]

  # --- AI / agent tooling (forks + hubs) ---
  claude-code:
    repo: git@github.com:FlexNetOS/claude-code.git
    tags: [ai, forked]
  codex:
    repo: git@github.com:FlexNetOS/codex.git
    tags: [ai, forked]
  oh-my-claudecode:
    repo: git@github.com:FlexNetOS/oh-my-claudecode.git
    tags: [ai, forked]
  oh-my-pi:
    repo: git@github.com:FlexNetOS/oh-my-pi.git
    tags: [ai, forked]
  ECC:
    repo: git@github.com:FlexNetOS/ECC.git
    tags: [ai, forked]
  Archon:
    repo: git@github.com:FlexNetOS/Archon.git
    tags: [ai, forked, harness]
  prompt_hub:
    repo: git@github.com:FlexNetOS/prompt_hub.git
    provides: [prompts]
    tags: [ai, prompts]
  hermes-agent:
    repo: git@github.com:FlexNetOS/hermes-agent.git
    tags: [ai, agents, untriaged]

  # --- Tools / automation ---
  rtk-tokenkill:
    repo: git@github.com:FlexNetOS/rtk-tokenkill.git
    provides: [rtk]
    tags: [tools, ai, optimization]
  n8n:
    repo: git@github.com:FlexNetOS/n8n.git
    tags: [automation, forked]
  weave:
    repo: git@github.com:FlexNetOS/weave.git
    provides: [weave]
    tags: [mcp, orchestration]

  lane:
    repo: git@github.com:FlexNetOS/lane.git
    provides: [lane]
    tags: [tools, workflow]
  icm:
    repo: git@github.com:FlexNetOS/icm.git
    provides: [icm]
    tags: [ai, memory]
  grit:
    repo: git@github.com:FlexNetOS/grit.git
    tags: [untriaged]
  obscura:
    repo: git@github.com:FlexNetOS/obscura.git
    tags: [untriaged]

  # --- Knowledge / distro ---
  obsidian-mind:
    repo: git@github.com:FlexNetOS/obsidian-mind.git
    tags: [docs, knowledge]
  lifeos:
    repo: git@github.com:FlexNetOS/lifeos.git
    tags: [untriaged]

  # --- Hubs + collections (new empty repos; content TBD) ---
  template_hub:
    repo: git@github.com:FlexNetOS/template_hub.git
    tags: [hub, templates]
  assets:
    repo: git@github.com:FlexNetOS/assets.git
    tags: [assets]
  flow_hub:
    repo: git@github.com:FlexNetOS/flow_hub.git
    tags: [hub, flow]
  harness_hub:
    repo: git@github.com:FlexNetOS/harness_hub.git
    tags: [hub, harness]
  harness-agent-rs:
    repo: git@github.com:FlexNetOS/harness-agent-rs.git
    tags: [ai, harness, rust, runtime, port]
  network_hub:
    repo: git@github.com:FlexNetOS/network_hub.git
    tags: [hub, network]
  my-wiki:
    repo: git@github.com:FlexNetOS/my-wiki.git
    tags: [docs, wiki]
  tool_hub:
    repo: git@github.com:FlexNetOS/tool_hub.git
    tags: [hub, tools]
  database_hub:
    repo: git@github.com:FlexNetOS/database_hub.git
    tags: [hub, database]
  mcp_hub:
    repo: git@github.com:FlexNetOS/mcp_hub.git
    tags: [hub, mcp]
    meta: true  # nested: mcp_hub hosts forked external MCP servers (e.g. n8n-mcp)
  plugin_hub:
    repo: git@github.com:FlexNetOS/plugin_hub.git
    tags: [hub, plugins]
  hooks_hub:
    repo: git@github.com:FlexNetOS/hooks_hub.git
    tags: [hub, hooks]
  commands:
    repo: git@github.com:FlexNetOS/commands.git
    tags: [hub, commands]
  vault_hub:
    repo: git@github.com:FlexNetOS/vault_hub.git
    tags: [hub, vault]

  # kasetto — the agent-environment provisioner (installed binary 3.1.0). The org
  # fork of pivoshenko/kasetto lives under the historical name env_manager_agent;
  # registered here as `kasetto` (resolves open-questions #5: canonical source located).
  kasetto:
    repo: git@github.com:FlexNetOS/env_manager_agent.git
    path: kasetto
    provides: [kasetto]
    tags: [tools, agent-env, forked]

  # vox — text-to-speech feedback tool (piper backend, English). Org fork of
  # rtk-ai/vox; the operative fix/english-defaults work is merged into fork main.
  vox:
    repo: git@github.com:FlexNetOS/vox.git
    provides: [vox]
    tags: [tools, voice, forked]

  # rusty-idd — intent-driven development tool (genuine org repo, default develop).
  # Adopted from ~/Desktop/idd-merge-idd during the 2026-06-12 stray sweep.
  rusty-idd:
    repo: git@github.com:FlexNetOS/rusty-idd.git
    tags: [tools, idd]

  # --- Newly Adopted Repos ---
  teri:
    repo: git@github.com:FlexNetOS/teri.git
    tags: [untriaged, forked]
  shimmy:
    repo: git@github.com:FlexNetOS/shimmy.git
    tags: [untriaged, forked]

  ruvector:
    repo: git@github.com:FlexNetOS/meta-ruvector.git
    path: RuVector
    provides: [ruvector]
    tags: [ai, rust, wasm, forked]

  ruflo:
    repo: git@github.com:FlexNetOS/ruflo.git
    provides: [ruflo]
    tags: [ai, rust, wasm, forked]

  # yazelix — terminal environment (zellij+yazi+helix+nushell) homed per ADR-0006
  # (portability mission 2026-06-12). Genuine fork of luccahuguet/yazelix; pin branch
  # pin-meta-2026-06-12 records the installed rev e60d15e. envctl's nix-yazelix
  # component installs from this fork; user config lives in envctl/home/.config/yazelix.
  yazelix:
    repo: git@github.com:FlexNetOS/yazelix.git
    tags: [env, terminal, forked]

  # agent-skills — kasetto skill/MCP source referenced by the global kasetto.yaml
  # (envctl/home/.config/kasetto/kasetto.yaml). Registered per ADR-0006: everything
  # meta consumes lives inside meta.
  agent-skills:
    repo: git@github.com:FlexNetOS/agent-skills.git
    tags: [ai, agent-env]
