  # yazelix — terminal environment (zellij+yazi+helix+nushell) homed per ADR-0006
  # (portability mission 2026-06-12). Genuine fork of luccahuguet/yazelix; pin branch
  # pin-meta-2026-06-12 records the installed rev e60d15e. envctl's nix-yazelix
  # component installs from this fork; user config lives in envctl/home/.config/yazelix.
  yazelix:
    repo: git@github.com:FlexNetOS/yazelix.git
    tags: [env, terminal, forked]
  # ohmyzsh — config framework for the meta-owned zsh (.toolchains/zsh, built by
  # the envctl `zsh` component). NOT a binary source (omz requires a pre-existing
  # zsh); it's the $ZDOTDIR config layer wired by the envctl `ohmyzsh` component.
  ohmyzsh:
    repo: git@github.com:FlexNetOS/ohmyzsh.git
    tags: [env, shell, forked]

  # agent-skills — kasetto skill/MCP source referenced by the global kasetto.yaml
  # (envctl/home/.config/kasetto/kasetto.yaml). Registered per ADR-0006: everything
  # meta consumes lives inside meta.
  agent-skills:
    repo: git@github.com:FlexNetOS/agent-skills.git
    tags: [ai, agent-env]
