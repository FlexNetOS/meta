defaults:
  parallel: true

projects:
  network-control:
    repo: git@github.com:FlexNetOS/network-control.git
    provides: [netctl, netctl-gui]
    tags: [tools, network]   # network plane: pure-Rust net control suite; composes lane (spine) + ruvector crates
  handoff:
    repo: git@github.com:FlexNetOS/handoff.git
    tags: [orchestration, handoff]
  # Foundation crates (no workspace deps)
  loop_lib:
    repo: git@github.com:FlexNetOS/loop_lib.git
    provides: [loop-lib]
    tags: [canon]

  meta_plugin_protocol:
    repo: git@github.com:FlexNetOS/meta_plugin_protocol.git
    provides: [plugin-protocol]
    tags: [canon]

  meta_plugin_api:
    repo: git@github.com:FlexNetOS/meta_plugin_api.git
    provides: [plugin-api]
    tags: [canon]

  meta_core:
    repo: git@github.com:FlexNetOS/meta_core.git
    provides: [meta-core]
    tags: [canon]

  meta_git_lib:
    repo: git@github.com:FlexNetOS/meta_git_lib.git
    provides: [meta-git-lib]
    tags: [canon]

  # Mid-level crates
  loop_cli:
    repo: git@github.com:FlexNetOS/loop_cli.git
    depends_on: [loop-lib]
    tags: [canon]

  meta_cli:
    repo: git@github.com:FlexNetOS/meta_cli.git
    provides: [meta-cli]
    depends_on: [meta-core, plugin-protocol, loop-lib]
    tags: [canon]

  # Top-level crates (depend on meta_cli and/or plugins)
  meta_git_cli:
    repo: git@github.com:FlexNetOS/meta_git_cli.git
    depends_on: [plugin-protocol, meta-git-lib, meta-cli, loop-lib]
    tags: [canon]

  meta_project_cli:
    repo: git@github.com:FlexNetOS/meta_project_cli.git
    depends_on: [plugin-protocol, meta-cli, meta-git-lib]
    tags: [canon]

  meta_rust_cli:
    repo: git@github.com:FlexNetOS/meta_rust_cli.git
    depends_on: [plugin-protocol, meta-cli]
    tags: [canon]

  meta_mcp:
    repo: git@github.com:FlexNetOS/meta_mcp.git
    provides: [meta-mcp]
    tags: [tools, mcp]
    depends_on: [meta-cli]

  # `meta dashboard` — renders the yazelix mission-control layout by shelling
  # to `envctl dashboard --json` (no envctl crate dep; loose CLI coupling).
  meta_dashboard_cli:
    repo: git@github.com:FlexNetOS/meta_dashboard_cli.git
    provides: [meta-dashboard-cli]
    tags: [tools, dashboard]
    depends_on: [plugin-protocol]

  # Standalone tools
  agent:
    repo: git@github.com:FlexNetOS/agent.git
    provides: [agent]
    tags: [ai, framework]

  atc:
    repo: git@github.com:FlexNetOS/atc.git
    provides: [atc]
    tags: [ai, orchestration, rust]   # mission-control: group under the `ai` tab (agent orchestrator)

  envctl:
    repo: git@github.com:FlexNetOS/envctl.git
    provides: [envctl]
    tags: [tools, env]

  # Non-code repos
  claude-plugins:
    repo: git@github.com:FlexNetOS/claude-plugins.git
    tags: [ai]   # mission-control: Claude Code plugins -> `ai` tab

  claude-plugin:
    repo: git@github.com:FlexNetOS/meta.git
    path: claude-plugin
    tags: [ai, plugin]

  copilot-plugin:
    repo: git@github.com:FlexNetOS/meta.git
    path: copilot-plugin
    tags: [ai, plugin]

  meta-plugins:
    repo: git@github.com:FlexNetOS/meta-plugins.git
    tags: [tools]   # mission-control: dev tooling -> `tools` tab (with envctl)

  # Org defaults — community-health fallback + reusable CI (GitHub requires the
  # ".github" repo name; cloned to .github_org/ locally to avoid colliding with
  # the meta root's own .github/ directory). Tracked here as a peer.
  # Refactor in progress: tasks/github-meta-refactor (slim to roles 1 + 6).
  github_org:
    repo: git@github.com:FlexNetOS/.github.git
    path: .github_org
    tags: [org, ci]

  # =====================================================================
  # FlexNetOS workspace peers — grounded from the .github umbrella refactor.
  # Content placement is PROVISIONAL: repos are grounded first, content moved
  # later. Tags marked [untriaged] need classification. See tasks/github-meta-refactor.
  # =====================================================================

  # --- Extracted operational concerns (new repos) ---
  # flexnetos_secrets RETIRED → envctl (ADR-0007): envctl already owns the vault /
  # secretd / broker / relay + the ProviderMint GitHub-token seam, so a second store
  # would be split-brain.
  # flexnetos_github_app + flexnetos_runner are built at P0 per ADR-0008.
  # flexnetos_wiki + flexnetos_brain REMOVED 2026-06-27 (owner): empty repos (0 commits),
  # deleted from the org + unregistered. See prompt_hub docs/plans/meta-fleet-integration.md §G7.
  flexnetos_runner:
    repo: git@github.com:FlexNetOS/flexnetos_runner.git
    tags: [ops, runner]
  flexnetos_github_app:
    repo: git@github.com:FlexNetOS/flexnetos_github_app.git
    tags: [ops, github-app]

  # --- AI / agent tooling (forks + hubs) ---
  claude-code:
    repo: git@github.com:FlexNetOS/claude-code.git
    tags: [ai, forked]
  codex:
    repo: git@github.com:FlexNetOS/codex.git
    tags: [ai, forked]
  oh-my-claudecode:
    repo: git@github.com:FlexNetOS/oh-my-claudecode.git
    tags: [ai, forked]
  oh-my-pi:
    repo: git@github.com:FlexNetOS/oh-my-pi.git
    tags: [ai, forked]
  ECC:
    repo: git@github.com:FlexNetOS/ECC.git
    tags: [ai, forked]
  meta-yard:
    repo: git@github.com:FlexNetOS/meta-yard.git
    meta: true  # nested: Tier Y yard (Archon, MiroFish) — ported-from/not-adopted source, out of root build (P8.y)
    tags: [yard, nested]
  prompt_hub:
    repo: git@github.com:FlexNetOS/prompt_hub.git
    provides: [prompts]
    tags: [ai, prompts]
  hermes-agent:
    repo: git@github.com:FlexNetOS/hermes-agent.git
    tags: [ai, agents]

  # --- Tools / automation ---
  rtk-tokenkill:
    repo: git@github.com:FlexNetOS/rtk-tokenkill.git
    provides: [rtk]
    tags: [tools, ai, optimization]
  n8n:
    repo: git@github.com:FlexNetOS/n8n.git
    tags: [automation, forked]
  weave:
    repo: git@github.com:FlexNetOS/weave.git
    provides: [weave]
    tags: [mcp, orchestration]

  lane:
    repo: git@github.com:FlexNetOS/lane.git
    provides: [lane]
    tags: [tools, workflow]
  icm:
    repo: git@github.com:FlexNetOS/icm.git
    provides: [icm]
    tags: [ai, memory]
  grit:
    repo: git@github.com:FlexNetOS/grit.git
    provides: [grit]
    tags: [ai, rust, orchestration]
  obscura:
    repo: git@github.com:FlexNetOS/obscura.git
    tags: [network, ai, browser]   # network plane: governed web-egress engine for AI agents (lane↔obscura seam, ADR-0001)

  # --- Knowledge / distro ---
  obsidian-mind:
    repo: git@github.com:FlexNetOS/obsidian-mind.git
    tags: [docs, knowledge]
  lifeos:
    repo: git@github.com:FlexNetOS/lifeos.git
    provides: [lifeos]
    tags: [ai, tools, docs]

  # --- Hubs + collections (new empty repos; content TBD) ---
  template_hub:
    repo: git@github.com:FlexNetOS/template_hub.git
    tags: [hub, templates]
  # assets REMOVED 2026-06-27 (owner): empty repo (0 commits), deleted + unregistered.
  flow_hub:
    repo: git@github.com:FlexNetOS/flow_hub.git
    tags: [hub, flow]
  harness_hub:
    repo: git@github.com:FlexNetOS/harness_hub.git
    tags: [hub, harness]
  harness-agent-rs:
    repo: git@github.com:FlexNetOS/harness-agent-rs.git
    tags: [ai, harness, rust, runtime, port]
  network_hub:
    repo: git@github.com:FlexNetOS/network_hub.git
    tags: [hub, network]
  # my-wiki REMOVED 2026-06-27 (owner): empty repo (0 commits), deleted + unregistered.
  tool_hub:
    repo: git@github.com:FlexNetOS/tool_hub.git
    tags: [hub, tools]
  database_hub:
    repo: git@github.com:FlexNetOS/database_hub.git
    tags: [hub, database]
  mcp_hub:
    repo: git@github.com:FlexNetOS/mcp_hub.git
    tags: [hub, mcp]
    meta: true  # nested: mcp_hub hosts forked external MCP servers (e.g. n8n-mcp)
  plugin_hub:
    repo: git@github.com:FlexNetOS/plugin_hub.git
    tags: [hub, plugins]
  hooks_hub:
    repo: git@github.com:FlexNetOS/hooks_hub.git
    tags: [hub, hooks]
  commands:
    repo: git@github.com:FlexNetOS/commands.git
    tags: [hub, commands]
  vault_hub:
    repo: git@github.com:FlexNetOS/vault_hub.git
    tags: [hub, vault]

  # kasetto — the agent-environment provisioner. The org fork of pivoshenko/kasetto was
  # renamed env_manager_agent -> FlexNetOS/kasetto (2026-06-13); `main` synced UP to upstream
  # v3.2.0 (pre-sync FlexNetOS divergence preserved on branch
  # flexnetos-divergence-backup-2026-06-13 + archived as a git bundle in .archives/).
  kasetto:
    repo: git@github.com:FlexNetOS/kasetto.git
    path: kasetto
    provides: [kasetto]
    tags: [tools, agent-env, forked]

  # vox — text-to-speech feedback tool (piper backend, English). Org fork of
  # rtk-ai/vox; the operative fix/english-defaults work is merged into fork main.
  vox:
    repo: git@github.com:FlexNetOS/vox.git
    provides: [vox]
    tags: [tools, voice, forked]

  # rusty-idd — intent-driven development tool (genuine org repo, default develop).
  # Adopted from ~/Desktop/idd-merge-idd during the 2026-06-12 stray sweep.
  rusty-idd:
    repo: git@github.com:FlexNetOS/rusty-idd.git
    tags: [tools, idd]

  # --- Newly Adopted Repos ---
  teri:
    repo: git@github.com:FlexNetOS/teri.git
    provides: [teri]
    tags: [ai, rust, forked]
  shimmy:
    repo: git@github.com:FlexNetOS/shimmy.git
    provides: [shimmy]
    tags: [ai, rust, network, forked]

  # --- Inference / GPU eval forks (Tier C; origin=FlexNetOS, upstream=source, drift pinned) ---
  cellm:
    repo: git@github.com:FlexNetOS/cellm.git
    tags: [ai, rust, inference, forked]   # upstream jeffasante/cellm — mobile-first pure-Rust LLM engine (CPU/Metal/Vulkan, no CUDA); CLI/FFI/WASM, no HTTP server
  cuda-oxide:
    repo: git@github.com:FlexNetOS/cuda-oxide.git
    tags: [gpu, rust, forked]   # upstream NVlabs/cuda-oxide — rustc backend, Rust→PTX AOT via llc-21 (sm_120a verified); teri's documented nightly GPU codegen path (RUNBOOK §3.1)
  inferrs:
    repo: git@github.com:FlexNetOS/inferrs.git
    tags: [ai, rust, inference, forked]   # upstream ericcurtin/inferrs — candle-based TurboQuant server; OpenAI/Anthropic/Ollama APIs, CUDA/ROCm/Metal/Vulkan/CPU

  ruvector:
    repo: git@github.com:FlexNetOS/meta-ruvector.git
    path: meta-ruvector
    # crates-only adoption — POLICY P8.a (all-crates mode). GOLD = the CRATES ONLY:
    # everything else in this repo (npm/ui/examples/runtime/NAPI/docs) is OUT OF SCOPE
    # and must NEVER be wired into meta — using anything outside crates/ breaks the
    # build and burns months. ALL crates under crates/ are adopted and wired as path
    # deps (default-features off), EXCEPT the `reserved:` ESP32 xtensa firmware crates
    # which live in meta-hardware and cannot build host-green (ruvLLM/esp32 non-flash
    # stays here — it builds host-green). Set derived from RUVECTOR-CRATE-LEDGER.md.
    adopt: all-crates                 # wire every crate under crates/ except `reserved:` (P8.39)
    reserved:
      - esp32-flash                   # ESP32-S3 xtensa firmware → meta-hardware (P8.39)
      - esp32-mmwave-sensor           # ESP32-S3 xtensa firmware → meta-hardware (P8.39)
    # provides: = notable-crates index (NON-exhaustive; full adopted set = all crates/ minus reserved):
    provides:
      - codex-env  # Codex-compatible execution environment adapter
      - cognitum-gate-kernel  # per-tile anytime-valid mincut e-value gate (policy HW root)
      - cognitum-gate-tilezero  # decide(ActionContext)->Permit/Deny/Defer + WitnessReceipt (policy, HFTASK-0017)
      - emergent-time  # Wheeler-DeWitt, Page-Wootters entropic structural proper time
      - hailort-sys  # Hailo RT system bindings for Pi 5 AI HAT+ hardware acceleration
      - mcp-brain  # Brain MCP tooling and protocol integration
      - mcp-brain-server  # Central brain MCP server for collective knowledge retrieval
      - mcp-gate  # Access gate/proxy for MCP server management
      - neural-trader-coherence  # CoherenceGate / WitnessReceipt (domain gate pattern)
      - neural-trader-core  # Neural market analysis engine core
      - neural-trader-replay  # Market scenario replay engine
      - neural-trader-strategies  # Trading strategy library and backtester
      - neural-trader-wasm  # Neural trader WASM bindings for browser dashboards
      - photonlayer-bench  # PhotonLayer benchmarking suite
      - photonlayer-cli  # PhotonLayer command-line interface
      - photonlayer-core  # PhotonLayer optical-frontend computing simulator core
      - photonlayer-ruvector  # PhotonLayer <-> ruvector bridge integration
      - photonlayer-wasm  # PhotonLayer WASM bindings for browser visualization
      - prime-radiant  # Prime number theory driven computation substrate
      - ruos-thermal  # Pi 5 thermal supervisor daemon
      - ruvector-acorn  # Persistent vector storage engine with ACID guarantees
      - ruvector-acorn-wasm  # Acorn WASM bindings for browser persistence
      - ruvector-agent-memory  # Agent knowledge store with HNSW retrieval
      - ruvector-attention  # Unified attention kernel library (multi-head, grouped-query)
      - ruvector-attention-node  # Attention N-API node bindings
      - ruvector-attention-unified-wasm  # Unified attention WASM runtime
      - ruvector-attention-wasm  # Attention WASM bindings for browser inference
      - ruvector-attn-mincut  # Min-cut based attention pruning
      - ruvector-bench  # Unified benchmarking infrastructure across all ruvector crates
      - ruvector-bet4-ivf-bench  # IVF-BET4 benchmark suite for vector search comparison
      - ruvector-cli
      - ruvector-cluster  # Vector cluster formation and management
      - ruvector-cnn  # Convolutional neural network layer library for vector processing
      - ruvector-cnn-wasm  # CNN WASM bindings for browser inference
      - ruvector-cognitive-container  # Cognitive state container with session management
      - ruvector-coherence  # HNSW health/drift monitor (handoff-drift)
      - ruvector-coherence-hnsw  # Coherence-driven HNSW index optimizer
      - ruvector-collections  # Multi-index vector collections manager
      - ruvector-consciousness  # Integrated information theory (Phi) computation engine
