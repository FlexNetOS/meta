[package]
name = "codegraph-parser"
version = "1.0.0"
edition = "2021"
authors = ["CodeGraph Team"]
license = "MIT OR Apache-2.0"
description = "Source code parsing using tree-sitter for CodeGraph"
publish = false

[dependencies]
aho-corasick = "1.1"
anyhow = "1"
async-trait = "0.1"
codegraph-core = { path = "../codegraph-core", default-features = false }
chrono = { version = "0.4", features = ["serde"] }
crossbeam-channel = "0.5"
dashmap = "6"
futures = "0.3"
globset = "0.4"
ignore = "0.4"
notify = "8"
num_cpus = "1"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
similar = "3"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tree-sitter = "0.24"
tree-sitter-c-sharp = "0.23"
tree-sitter-cpp = "0.23"
tree-sitter-go = "0.23"
tree-sitter-java = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-php = "0.23"
tree-sitter-python = "0.23"
tree-sitter-ruby = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-swift = "0.7.1"
tree-sitter-typescript = "0.23"
uuid = { version = "1", features = ["v4", "serde"] }

[target.'cfg(target_os = "linux")'.dependencies]
tokio-uring = { version = "0.5", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
experimental = ["watcher-experimental"]
watcher-experimental = []
io-uring = ["dep:tokio-uring"]
