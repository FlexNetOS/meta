name: runner-smoke

# Throwaway self-hosted-runner verification probe (no production impact).
# Triggers on push to a smoke/runner-** branch and on manual dispatch.
# Two legs with DIFFERENT label sets disambiguate a label-match failure:
#   - minimal: only [self-hosted] (every self-hosted runner always has it)
#   - full   : the exact ci.yml trusted-path set
# Whichever leg a runner picks up tells us which label set actually matches.
on:
  push:
    branches: ['smoke/runner-**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: fxrun smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - leg: minimal
            labels: '["self-hosted"]'
          - leg: full
            labels: '["self-hosted", "linux", "x64", "local", "flexnetos"]'
    runs-on: ${{ fromJSON(matrix.labels) }}
    steps:
      - name: Identify runner + prove local execution
        run: |
          echo "leg            : ${{ matrix.leg }}"
          echo "labels         : ${{ matrix.labels }}"
          echo "RUNNER_NAME    : ${RUNNER_NAME:-<unset>}"
          echo "host           : $(hostname)"
          uname -a
          echo "fxrun smoke OK on $(hostname) runner=${RUNNER_NAME:-?} leg=${{ matrix.leg }}"
