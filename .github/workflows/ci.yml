name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow this workflow to be called by other workflows

env:
  CARGO_TERM_COLOR: always

# Runner policy: the Linux (ubuntu-latest) matrix legs run on the FlexNetOS
# self-hosted LOCAL runner for the trusted (non-fork) path; fork PRs and the
# macOS/Windows legs stay on GitHub-hosted runners (the local box is Linux and
# cannot run them). Matrix job names are preserved so the branch-protection
# required checks (Test (ubuntu-latest), Test (macos-latest), ...) keep
# reporting — collapsing the matrix would orphan them and permanently BLOCK PRs.
# Auth policy: child-repo clones authenticate as the `flexnetos-github-app`
# GitHub App (installation token = 5000 req/hr) instead of an unauthenticated
# clone (60 req/hr). The mint step is fail-safe: if the App secrets are not
# set, it is skipped (continue-on-error) and the token falls back to the
# existing PAT, then github.token — so CI never regresses below today.

jobs:
  agent-wiring:
    name: Agent Wiring
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Codex git-kb note wiring
        run: bash scripts/check-codex-kb-note-wiring.sh

  test:
    name: Test
    runs-on: ${{ (matrix.os == 'ubuntu-latest' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mint GitHub App token (5000/hr; falls back to PAT)
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLEXNETOS_APP_ID }}
          private-key: ${{ secrets.FLEXNETOS_APP_PRIVATE_KEY }}
          owner: FlexNetOS

      - name: Clone child repos
        shell: bash
        env:
          CHILD_CLONE_TOKEN: ${{ steps.app-token.outputs.token || secrets.PARENT_REPO_PAT || github.token }}
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-${{ matrix.os }}"

      - name: Install kache rustc wrapper
        shell: bash
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
          RUSTC_WRAPPER: ""
        run: |
          if ! command -v kache >/dev/null 2>&1; then
            cargo install kache --version 0.6.0 --locked
          fi
          kache --version

      - name: Run tests
        run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","linux","x64","local","flexnetos"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mint GitHub App token (5000/hr; falls back to PAT)
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLEXNETOS_APP_ID }}
          private-key: ${{ secrets.FLEXNETOS_APP_PRIVATE_KEY }}
          owner: FlexNetOS

      - name: Clone child repos
        env:
          CHILD_CLONE_TOKEN: ${{ steps.app-token.outputs.token || secrets.PARENT_REPO_PAT || github.token }}
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy"

      - name: Install kache rustc wrapper
        shell: bash
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
          RUSTC_WRAPPER: ""
        run: |
          if ! command -v kache >/dev/null 2>&1; then
            cargo install kache --version 0.6.0 --locked
          fi
          kache --version

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  integration:
    name: Integration Tests
    runs-on: ${{ (matrix.os == 'ubuntu-latest' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mint GitHub App token (5000/hr; falls back to PAT)
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLEXNETOS_APP_ID }}
          private-key: ${{ secrets.FLEXNETOS_APP_PRIVATE_KEY }}
          owner: FlexNetOS

      - name: Clone child repos
        env:
          CHILD_CLONE_TOKEN: ${{ steps.app-token.outputs.token || secrets.PARENT_REPO_PAT || github.token }}
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "integration-${{ matrix.os }}"

      - name: Install kache rustc wrapper
        shell: bash
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
          RUSTC_WRAPPER: ""
        run: |
          if ! command -v kache >/dev/null 2>&1; then
            cargo install kache --version 0.6.0 --locked
          fi
          kache --version

      - name: Build workspace
        run: cargo build --workspace

      - name: Verify binaries
        run: |
          ls -lh target/debug/meta target/debug/meta-git
          ./target/debug/meta --version
          ./target/debug/meta-git --meta-plugin-info | jq .name
        shell: bash

      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            command -v bats >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y bats; }
          else
            brew install bats-core
          fi
        shell: bash

      - name: Run integration tests
        run: bats tests/*.bats
        shell: bash

  envctl:
    # envctl is meta's environment manager. It builds as its OWN workspace (it owns its no-C
    # pins) but path-deps loop_lib + meta_plugin_protocol, so it resolves only WITHIN the meta
    # tree — this job clones the children (incl. envctl) and builds/tests it in place, closing
    # the gap where meta never verified its own env manager. Linux-only (envctl targets the box).
    name: envctl (meta-tree build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone child repos
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install kache rustc wrapper
        shell: bash
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
          RUSTC_WRAPPER: ""
        run: |
          if ! command -v kache >/dev/null 2>&1; then
            cargo install kache --version 0.6.0 --locked
          fi
          kache --version

      - name: Build + test envctl (its own workspace, resolved within the meta tree)
        run: |
          cd envctl
          cargo build -p envctl-engine -p envctl --bin meta-env
          cargo test -p envctl-engine
          cargo clippy -p envctl-engine -p envctl --bin meta-env -- -D warnings
          bash ci/gates/no-c.sh
        shell: bash

      - name: Verify the meta-env plugin speaks the protocol
        run: cd envctl && ./target/debug/meta-env --meta-plugin-info | jq .name
        shell: bash

  format:
    name: Format
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","linux","x64","local","flexnetos"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mint GitHub App token (5000/hr; falls back to PAT)
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLEXNETOS_APP_ID }}
          private-key: ${{ secrets.FLEXNETOS_APP_PRIVATE_KEY }}
          owner: FlexNetOS

      - name: Clone child repos
        env:
          CHILD_CLONE_TOKEN: ${{ steps.app-token.outputs.token || secrets.PARENT_REPO_PAT || github.token }}
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install kache rustc wrapper
        shell: bash
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
          RUSTC_WRAPPER: ""
        run: |
          if ! command -v kache >/dev/null 2>&1; then
            cargo install kache --version 0.6.0 --locked
          fi
          kache --version

      - name: Check formatting
        run: cargo fmt --all -- --check
