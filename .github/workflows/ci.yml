name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow this workflow to be called by other workflows

env:
  CARGO_TERM_COLOR: always
  # Child repos under FlexNetOS are private — clones must authenticate.
  # PARENT_REPO_PAT is the org-level cross-repo token; github.token only
  # covers public children (fallback for forks without the secret).
  CHILD_CLONE_TOKEN: ${{ secrets.PARENT_REPO_PAT || github.token }}

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone child repos
        shell: bash
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-${{ matrix.os }}"

      - name: Run tests
        run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone child repos
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy"

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  integration:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone child repos
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "integration-${{ matrix.os }}"

      - name: Build workspace
        run: cargo build --workspace

      - name: Verify binaries
        run: |
          ls -lh target/debug/meta target/debug/meta-git
          ./target/debug/meta --version
          ./target/debug/meta-git --meta-plugin-info | jq .name
        shell: bash

      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y bats
          else
            brew install bats-core
          fi
        shell: bash

      - name: Run integration tests
        run: bats tests/*.bats
        shell: bash

  envctl:
    # envctl is meta's environment manager. It builds as its OWN workspace (it owns its no-C
    # pins) but path-deps loop_lib + meta_plugin_protocol, so it resolves only WITHIN the meta
    # tree — this job clones the children (incl. envctl) and builds/tests it in place, closing
    # the gap where meta never verified its own env manager. Linux-only (envctl targets the box).
    name: envctl (meta-tree build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone child repos
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build + test envctl (its own workspace, resolved within the meta tree)
        run: |
          cd envctl
          cargo build -p envctl-engine -p envctl --bin meta-env
          cargo test -p envctl-engine
          cargo clippy -p envctl-engine -p envctl --bin meta-env -- -D warnings
          bash ci/gates/no-c.sh
        shell: bash

      - name: Verify the meta-env plugin speaks the protocol
        run: cd envctl && ./target/debug/meta-env --meta-plugin-info | jq .name
        shell: bash

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone child repos
        run: .github/scripts/clone-child-repos.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
# Testing CI with config fix
