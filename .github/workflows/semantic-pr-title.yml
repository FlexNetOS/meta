name: Semantic PR Title

# Keep this required check self-contained so PRs do not depend on a reusable
# workflow being visible and runnable during pull_request_target evaluation.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(build|chore|ci|deps|docs|feat|fix|perf|refactor|revert|style|test)(\([A-Za-z0-9._/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow Conventional Commit format."
            echo "Received: $PR_TITLE"
            echo "Expected: type(scope): summary or type: summary"
            exit 1
          fi
